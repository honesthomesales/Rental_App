name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install all dependencies
        run: npm ci
        
      - name: Build packages
        run: |
          echo "Installing and building API package..."
          cd packages/api
          npm install
          npm run build
          echo "Installing and building UI package..."
          cd ../ui
          npm install
          npm run build
          echo "Packages built successfully"
        
      - name: Install web app dependencies
        run: |
          cd apps/web
          npm install
        
      - name: Build web application
        run: |
          echo "Building web application..."
          echo "NODE_ENV: $NODE_ENV"
          echo "NEXT_PUBLIC_SUPABASE_URL: $NEXT_PUBLIC_SUPABASE_URL"
          cd apps/web
          npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Debug - List build output
        run: |
          echo "Checking if out directory exists:"
          ls -la apps/web/
          echo "Checking if out directory was created:"
          ls -la apps/web/out/ || echo "out directory not found"
          echo "Checking if .next directory exists:"
          ls -la apps/web/.next/ || echo ".next directory not found"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './apps/web/out'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 